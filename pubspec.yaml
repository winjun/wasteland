name: wasteland_warriors
description: "Wasteland Warriors - Post-apocalyptic tactical cover shooter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: 2.5.3
  provider: 6.1.5+1
  flame: 1.32.0
  sensors_plus: 6.1.1
  audioplayers: 6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
